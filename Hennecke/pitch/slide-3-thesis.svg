<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="8" fill="#c8102e"/>

  <!-- header -->
  <text x="50" y="62" font-size="33" font-weight="bold" fill="#1f3a5f">Investment thesis &#8212; value, risks &amp; recommendation</text>
  <text x="50" y="92" font-size="17" fill="#666666">Margin-recovery &amp; aftermarket story on a structurally-supported PU platform</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL &#183; For Board discussion</text>

  <!-- ===== Column A: value creation ===== -->
  <rect x="50" y="125" width="480" height="560" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <rect x="50" y="125" width="480" height="50" rx="10" fill="#2e7d4f"/>
  <rect x="50" y="150" width="480" height="25" fill="#2e7d4f"/>
  <text x="74" y="158" font-size="18" font-weight="bold" fill="#ffffff">Value-creation levers</text>
  <g font-size="16" fill="#222">
    <circle cx="84" cy="214" r="4" fill="#2e7d4f"/><text x="102" y="220"><tspan font-weight="bold">Margin recovery 3.5% &#8594; 6-8%</tspan> via</text>
    <text x="102" y="242">fixed-cost efficiency.</text>
    <circle cx="84" cy="280" r="4" fill="#2e7d4f"/><text x="102" y="286">Grow the recurring <tspan font-weight="bold">aftermarket</tspan></text>
    <text x="102" y="308">(service, spares, retrofit).</text>
    <circle cx="84" cy="346" r="4" fill="#2e7d4f"/><text x="102" y="352">Working-capital optimisation</text>
    <text x="102" y="374">(already underway: DIO 119&#8594;66).</text>
    <circle cx="84" cy="412" r="4" fill="#2e7d4f"/><text x="102" y="418">Backlog normalisation &amp; pricing</text>
    <text x="102" y="440">discipline on projects.</text>
    <circle cx="84" cy="478" r="4" fill="#2e7d4f"/><text x="102" y="484">Optional <tspan font-weight="bold">buy-and-build</tspan> in PU /</text>
    <text x="102" y="506">adjacent capital-goods machinery.</text>
  </g>
  <rect x="74" y="535" width="432" height="128" rx="8" fill="#eef6f0" stroke="#cfe6d8"/>
  <text x="94" y="565" font-size="15" font-weight="bold" fill="#2e7d4f">Structural demand drivers</text>
  <text x="94" y="592" font-size="14" fill="#333">Building energy efficiency (insulating</text>
  <text x="94" y="612" font-size="14" fill="#333">panels) &#183; cold chain &#183; e-mobility &#183;</text>
  <text x="94" y="632" font-size="14" fill="#333">blowing-agent transition (HFO/pentane).</text>

  <!-- ===== Column B: key risks ===== -->
  <rect x="560" y="125" width="480" height="560" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <rect x="560" y="125" width="480" height="50" rx="10" fill="#c8102e"/>
  <rect x="560" y="150" width="480" height="25" fill="#c8102e"/>
  <text x="584" y="158" font-size="18" font-weight="bold" fill="#ffffff">Key risks &amp; cautions</text>
  <g font-size="16" fill="#222">
    <circle cx="594" cy="214" r="4" fill="#c8102e"/><text x="612" y="220"><tspan font-weight="bold">Thin, volatile margins</tspan>; 2024</text>
    <text x="612" y="242">operating loss (-&#8364;1.0M EBIT).</text>
    <circle cx="594" cy="280" r="4" fill="#c8102e"/><text x="612" y="286"><tspan font-weight="bold">Captive nature</tspan> &#8594; carve-out</text>
    <text x="612" y="308">complexity (brand, IT, shared svcs).</text>
    <circle cx="594" cy="346" r="4" fill="#c8102e"/><text x="612" y="352">Heavy <tspan font-weight="bold">intercompany</tspan> ties &amp; group</text>
    <text x="612" y="374">treasury &#8212; limited autonomy.</text>
    <circle cx="594" cy="412" r="4" fill="#c8102e"/><text x="612" y="418"><tspan font-weight="bold">Pledged shares</tspan> to be released;</text>
    <text x="612" y="440">thin equity (&#8364;6.0M).</text>
    <circle cx="594" cy="478" r="4" fill="#c8102e"/><text x="612" y="484"><tspan font-weight="bold">Intangibles &#8364;12.0M</tspan> &#8212; impairment</text>
    <text x="612" y="506">risk; cyclicality &amp; execution risk.</text>
  </g>
  <rect x="584" y="535" width="432" height="128" rx="8" fill="#fdeef0" stroke="#f3c5cc"/>
  <text x="604" y="565" font-size="15" font-weight="bold" fill="#c8102e">Mitigants</text>
  <text x="604" y="592" font-size="14" fill="#333">Light balance sheet &amp; high liquidity;</text>
  <text x="604" y="612" font-size="14" fill="#333">global installed base; world-class group</text>
  <text x="604" y="632" font-size="14" fill="#333">R&amp;D and sales network behind the asset.</text>

  <!-- ===== Column C: valuation & next steps ===== -->
  <rect x="1070" y="125" width="480" height="560" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <rect x="1070" y="125" width="480" height="50" rx="10" fill="#1f3a5f"/>
  <rect x="1070" y="150" width="480" height="25" fill="#1f3a5f"/>
  <text x="1094" y="158" font-size="18" font-weight="bold" fill="#ffffff">Valuation &amp; next steps</text>

  <rect x="1094" y="195" width="432" height="92" rx="8" fill="#eef2f7" stroke="#cdd8e6"/>
  <text x="1110" y="225" font-size="15" fill="#555">Indicative EV/EBITDA</text>
  <text x="1110" y="263" font-size="30" font-weight="bold" fill="#1f3a5f">6&#8211;9x</text>
  <text x="1300" y="263" font-size="16" fill="#777">(5&#8211;7x small-cap)</text>

  <text x="1094" y="320" font-size="15" fill="#333">Value on <tspan font-weight="bold">normalised EBITDA</tspan>, not the</text>
  <text x="1094" y="342" font-size="15" fill="#333">depressed 2024 figure; consider asset value.</text>

  <text x="1094" y="388" font-size="16" font-weight="bold" fill="#1f3a5f">Proceed to focused Due Diligence:</text>
  <g font-size="15" fill="#222">
    <circle cx="1104" cy="418" r="4" fill="#1f3a5f"/><text x="1122" y="424">Transfer pricing &amp; intercompany flows</text>
    <circle cx="1104" cy="452" r="4" fill="#1f3a5f"/><text x="1122" y="458">Backlog &amp; project margins</text>
    <circle cx="1104" cy="486" r="4" fill="#1f3a5f"/><text x="1122" y="492">Carve-out feasibility (brand / IT / people)</text>
    <circle cx="1104" cy="520" r="4" fill="#1f3a5f"/><text x="1122" y="526">EBITDA normalisation &amp; true net debt</text>
    <circle cx="1104" cy="554" r="4" fill="#1f3a5f"/><text x="1122" y="560">Share-pledge release &amp; intangibles testing</text>
  </g>
  <rect x="1094" y="585" width="432" height="78" rx="8" fill="#1f3a5f"/>
  <text x="1310" y="615" text-anchor="middle" font-size="15" fill="#cdd8e6">RECOMMENDATION</text>
  <text x="1310" y="645" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Approve progression to Phase-2 DD</text>

  <!-- ===== bottom SWOT-style one-liner band ===== -->
  <rect x="50" y="705" width="1500" height="120" rx="10" fill="#f7f8fa" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="74" y="742" font-size="17" font-weight="bold" fill="#1f3a5f">Bottom line</text>
  <text x="74" y="776" font-size="16" fill="#333">A historic-brand PU engineering platform with a global installed base and structural tailwinds, currently held back by</text>
  <text x="74" y="800" font-size="16" fill="#333">cyclical, thin margins. The opportunity is a <tspan font-weight="bold">margin-normalisation &amp; aftermarket</tspan> play &#8212; execution and carve-out feasibility are the swing factors.</text>

  <!-- footer -->
  <line x1="50" y1="858" x2="1550" y2="858" stroke="#e2e6ec"/>
  <text x="50" y="882" font-size="12" fill="#999999">For Board discussion &#8212; not an investment recommendation; subject to specialist Due Diligence.</text>
  <text x="1550" y="882" text-anchor="end" font-size="12" font-weight="bold" fill="#1f3a5f">3 / 3</text>
</svg>
