<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#1f3a5f"/>
  <rect x="0" y="0" width="1600" height="10" fill="#c8102e"/>

  <!-- Q&A title -->
  <text x="120" y="250" font-size="20" letter-spacing="3" fill="#9fb2c8">DISCUSSION</text>
  <rect x="120" y="272" width="90" height="5" fill="#c8102e"/>
  <text x="116" y="380" font-size="86" font-weight="bold" fill="#ffffff">Questions &amp; discussion</text>

  <!-- recommendation banner -->
  <rect x="120" y="430" width="900" height="92" rx="10" fill="#c8102e" filter="url(#sh)"/>
  <text x="148" y="466" font-size="15" letter-spacing="2" fill="#ffd7dc">RECOMMENDATION</text>
  <text x="148" y="500" font-size="26" font-weight="bold" fill="#ffffff">Approve progression to Phase-2 Due Diligence</text>

  <!-- key questions for the board -->
  <text x="120" y="586" font-size="22" font-weight="bold" fill="#f2c200">Key questions to align on</text>
  <g font-size="20" fill="#e3e9f1">
    <circle cx="132" cy="630" r="5" fill="#c8102e"/><text x="156" y="637">Preferred structure: carve-out of the Italian entity vs whole-Group platform?</text>
    <circle cx="132" cy="676" r="5" fill="#c8102e"/><text x="156" y="683">Risk appetite on the captive / intercompany &amp; carve-out complexity?</text>
    <circle cx="132" cy="722" r="5" fill="#c8102e"/><text x="156" y="729">Valuation basis &#8212; normalised EBITDA assumptions and entry multiple?</text>
    <circle cx="132" cy="768" r="5" fill="#c8102e"/><text x="156" y="775">Budget &amp; timeline for Phase-2 DD (financial, commercial, legal, tax)?</text>
  </g>

  <!-- right contact / next step card -->
  <rect x="1090" y="430" width="390" height="345" rx="12" fill="#284869" stroke="#3a5578" filter="url(#sh)"/>
  <text x="1115" y="478" font-size="18" font-weight="bold" fill="#ffffff">Next step</text>
  <line x1="1115" y1="492" x2="1455" y2="492" stroke="#3a5578"/>
  <text x="1115" y="532" font-size="16" fill="#cdd8e6">Mandate the deal team to launch</text>
  <text x="1115" y="556" font-size="16" fill="#cdd8e6">focused Due Diligence and return</text>
  <text x="1115" y="580" font-size="16" fill="#cdd8e6">with a normalised valuation and</text>
  <text x="1115" y="604" font-size="16" fill="#cdd8e6">indicative offer range.</text>
  <rect x="1115" y="636" width="340" height="2" fill="#3a5578"/>
  <text x="1115" y="678" font-size="15" fill="#9fb2c8">Project lead</text>
  <text x="1115" y="704" font-size="18" font-weight="bold" fill="#ffffff">Corporate Development / M&amp;A</text>
  <text x="1115" y="744" font-size="14" fill="#7e93ac">Materials available on request</text>

  <!-- footer -->
  <line x1="120" y1="822" x2="1480" y2="822" stroke="#2d4769"/>
  <text x="120" y="860" font-size="14" fill="#7e93ac">CONFIDENTIAL &#8212; For Board discussion only. Not an investment recommendation; subject to specialist Due Diligence.</text>
  <text x="1480" y="860" text-anchor="end" font-size="14" fill="#7e93ac">HENNECKE-OMS S.p.A. &#183; June 2026</text>
</svg>
