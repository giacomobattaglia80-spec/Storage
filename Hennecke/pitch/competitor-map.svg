<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="8" fill="#c8102e"/>
  <!-- header -->
  <text x="50" y="58" font-size="32" font-weight="bold" fill="#1f3a5f">Competitor map — PU machinery landscape</text>
  <text x="50" y="90" font-size="16" fill="#666666">Qualitative positioning of the main players in the reference sector</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL · For Board discussion</text>

  <!-- plot frame -->
  <rect x="120" y="158" width="880" height="530" rx="6" fill="#fbfcfd" stroke="#dfe4ea"/>
  <!-- axes -->
  <line x1="150" y1="425" x2="970" y2="425" stroke="#c9d2dd" stroke-width="1.4"/>
  <line x1="560" y1="190" x2="560" y2="660" stroke="#c9d2dd" stroke-width="1.4"/>
  <!-- axis labels -->
  <text x="560" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">▲ Global scale &amp; installed base</text>
  <text x="560" y="680" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">▼ Regional / niche reach</text>
  <text x="130" y="440" font-size="11.5" fill="#999999">◄ Specialised PU pure-play</text>
  <text x="960" y="440" text-anchor="end" font-size="11.5" fill="#999999">Diversified machinery group ►</text>

  <!-- bubbles -->
  <!-- Hennecke Group -->
  <circle cx="421" cy="256" r="27" fill="#1f3a5f" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="421" y="295" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">Hennecke Group</text>
  <text x="421" y="309" text-anchor="middle" font-size="9.5" font-style="italic" fill="#1f3a5f">PU world leader (incl. OMS)</text>
  <!-- Hennecke-OMS (target) -->
  <circle cx="322" cy="350" r="22" fill="#c8102e" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="322" y="384" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">Hennecke-OMS</text>
  <text x="322" y="398" text-anchor="middle" font-size="9.5" font-style="italic" fill="#c8102e">TARGET</text>
  <!-- Cannon / Afros -->
  <circle cx="404" cy="425" r="18" fill="#5b7a9e" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="404" y="455" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">Cannon / Afros</text>
  <!-- KraussMaffei -->
  <circle cx="839" cy="275" r="23" fill="#5b7a9e" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="839" y="310" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">KraussMaffei</text>
  <text x="839" y="324" text-anchor="middle" font-size="9.5" font-style="italic" fill="#999999">RPM unit · ChemChina</text>
  <!-- Kurtz Ersa -->
  <circle cx="757" cy="406" r="16" fill="#5b7a9e" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="757" y="434" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">Kurtz Ersa</text>
  <!-- Frimo -->
  <circle cx="642" cy="463" r="16" fill="#5b7a9e" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="642" y="491" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">Frimo</text>
  <!-- Saip -->
  <circle cx="314" cy="538" r="14" fill="#5b7a9e" stroke="#ffffff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="314" y="564" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222222">Saip</text>

  <!-- right panel -->
  <rect x="1020" y="158" width="530" height="530" rx="6" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="1044" y="192" font-size="16" font-weight="bold" fill="#1f3a5f">Key players</text>
  <line x1="1044" y1="201" x2="1526" y2="201" stroke="#dfe4ea"/>
  <g font-size="13" fill="#222222">
    <text x="1044" y="236"><tspan font-weight="bold" fill="#1f3a5f">Hennecke Group </tspan>(DE/IT) — world leader in</text>
    <text x="1062" y="255">PU process tech; includes the target.</text>
    <text x="1044" y="291"><tspan font-weight="bold">Cannon / Afros </tspan>(Peschiera B., IT) — PU</text>
    <text x="1062" y="310">metering, foam &amp; composites; main IT rival.</text>
    <text x="1044" y="346"><tspan font-weight="bold">KraussMaffei </tspan>(Munich, DE) — Reaction</text>
    <text x="1062" y="365">Process Machinery; diversified, ChemChina.</text>
    <text x="1044" y="401"><tspan font-weight="bold">Frimo Group </tspan>(Lotte, DE) — PU tooling &amp;</text>
    <text x="1062" y="420">systems, automotive-focused.</text>
    <text x="1044" y="456"><tspan font-weight="bold">Kurtz Ersa </tspan>(Kreuzwertheim, DE) — EPS/PU</text>
    <text x="1062" y="475">foaming machinery.</text>
    <text x="1044" y="511"><tspan font-weight="bold">Saip </tspan>(Offanengo, IT) — PU plants /</text>
    <text x="1062" y="530">refrigeration insulation.</text>
  </g>
  <rect x="1044" y="560" width="482" height="110" rx="6" fill="#eef2f7" stroke="#cdd8e6"/>
  <text x="1064" y="588" font-size="13" font-weight="bold" fill="#1f3a5f">Net read</text>
  <text x="1064" y="610" font-size="12.5" fill="#333333">The target sits among specialised PU</text>
  <text x="1064" y="630" font-size="12.5" fill="#333333">pure-plays with global, group-backed reach</text>
  <text x="1064" y="650" font-size="12.5" fill="#333333">— differentiated in sandwich-panel &amp;</text>
  <text x="1064" y="670" font-size="12.5" fill="#333333">flexible-foam lines.</text>

  <!-- footer -->
  <line x1="50" y1="858" x2="1550" y2="858" stroke="#e2e6ec"/>
  <text x="50" y="882" font-size="11" fill="#999999">Qualitative positioning — illustrative, not to scale; consolidated competitor revenues not disclosed in the analysed documents.</text>
  <text x="1550" y="882" text-anchor="end" font-size="11" font-weight="bold" fill="#1f3a5f">4 / 6</text>
</svg>
