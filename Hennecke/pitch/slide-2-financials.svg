<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="8" fill="#c8102e"/>

  <!-- header -->
  <text x="50" y="62" font-size="33" font-weight="bold" fill="#1f3a5f">Financial profile 2023&#8211;2024</text>
  <text x="50" y="92" font-size="17" fill="#666666">Cyclical &amp; project-based business &#183; thin margins &#183; self-financed working capital</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL &#183; For Board discussion</text>

  <!-- ===== LEFT: bar chart ===== -->
  <rect x="50" y="125" width="720" height="700" rx="10" fill="#f7f8fa" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="74" y="165" font-size="18" font-weight="bold" fill="#1f3a5f">2023 vs 2024 (&#8364; million)</text>

  <!-- legend -->
  <rect x="500" y="150" width="16" height="16" fill="#9fb2c8"/><text x="522" y="163" font-size="14" fill="#444">2023</text>
  <rect x="585" y="150" width="16" height="16" fill="#1f3a5f"/><text x="607" y="163" font-size="14" fill="#444">2024</text>

  <!-- chart axes: baseline y=620, left x=120 ; scale 5 px per EUR M (max ~52 -> 260px) -->
  <line x1="120" y1="620" x2="740" y2="620" stroke="#bbbbbb"/>
  <!-- gridlines -->
  <g font-size="12" fill="#999999">
    <line x1="120" y1="620" x2="740" y2="620" stroke="#e4e8ee"/>
    <line x1="120" y1="545" x2="740" y2="545" stroke="#e4e8ee"/><text x="112" y="549" text-anchor="end">15</text>
    <line x1="120" y1="470" x2="740" y2="470" stroke="#e4e8ee"/><text x="112" y="474" text-anchor="end">30</text>
    <line x1="120" y1="395" x2="740" y2="395" stroke="#e4e8ee"/><text x="112" y="399" text-anchor="end">45</text>
    <text x="112" y="624" text-anchor="end">0</text>
  </g>

  <!-- Group 1: Revenue (50.4 -> 252px ; 44.2 -> 221px) center ~220 -->
  <rect x="170" y="368" width="46" height="252" fill="#9fb2c8"/>
  <rect x="222" y="399" width="46" height="221" fill="#1f3a5f"/>
  <text x="193" y="360" text-anchor="middle" font-size="13" fill="#555">50.4</text>
  <text x="245" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a5f">44.2</text>
  <text x="219" y="648" text-anchor="middle" font-size="14" fill="#333">Revenue</text>

  <!-- Group 2: Value of production (52.0 -> 260 ; 40.7 -> 203) -->
  <rect x="360" y="360" width="46" height="260" fill="#9fb2c8"/>
  <rect x="412" y="417" width="46" height="203" fill="#1f3a5f"/>
  <text x="383" y="352" text-anchor="middle" font-size="13" fill="#555">52.0</text>
  <text x="435" y="409" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a5f">40.7</text>
  <text x="409" y="648" text-anchor="middle" font-size="14" fill="#333">Value of prod.</text>

  <!-- Group 3: EBITDA (3.6 -> 18 ; 1.5 -> 7.5) -->
  <rect x="565" y="602" width="46" height="18" fill="#9fb2c8"/>
  <rect x="617" y="612" width="46" height="8" fill="#c8102e"/>
  <text x="588" y="594" text-anchor="middle" font-size="13" fill="#555">3.6</text>
  <text x="640" y="604" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8102e">1.5</text>
  <text x="614" y="648" text-anchor="middle" font-size="14" fill="#333">EBITDA</text>

  <!-- margin callout -->
  <rect x="120" y="685" width="620" height="110" rx="8" fill="#fdeef0" stroke="#f3c5cc"/>
  <text x="140" y="718" font-size="16" font-weight="bold" fill="#c8102e">EBITDA margin: 7.2% &#8594; 3.5%</text>
  <text x="140" y="748" font-size="14" fill="#444">Drop driven by the WIP swing: change in work-in-progress</text>
  <text x="140" y="770" font-size="14" fill="#444">went from <tspan font-weight="bold">+&#8364;19.3M (2023)</tspan> to <tspan font-weight="bold">-&#8364;0.5M (2024)</tspan> &#8212; a timing</text>
  <text x="140" y="792" font-size="14" fill="#444">effect of long projects, not structural deterioration.</text>

  <!-- ===== RIGHT TOP: balance-sheet highlights ===== -->
  <rect x="800" y="125" width="750" height="320" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="824" y="165" font-size="18" font-weight="bold" fill="#1f3a5f">Balance-sheet highlights</text>
  <line x1="824" y1="178" x2="1526" y2="178" stroke="#e2e6ec"/>
  <g font-size="16" fill="#222">
    <text x="824" y="216"><tspan font-weight="bold">&#8364; 10.4M</tspan> cash  &#183;  vs <tspan font-weight="bold">&#8364; 6.9M</tspan> M/L bank debt (new 2024)</text>
    <text x="824" y="256"><tspan font-weight="bold">&#8364; 10.9M</tspan> customer advances fund the working capital</text>
    <text x="824" y="296"><tspan font-weight="bold">&#8364; 6.0M</tspan> equity &#8212; thin (15.5% of total assets)</text>
    <text x="824" y="336"><tspan font-weight="bold">&#8364; 12.0M</tspan> intangibles (goodwill) &#8212; impairment watch</text>
    <text x="824" y="376"><tspan font-weight="bold">&#8364; 29.5M</tspan> total debt &#8212; largely operating &amp; intercompany</text>
    <text x="824" y="416">Working capital improving: inventory <tspan font-weight="bold">DIO 119 &#8594; 66 days</tspan></text>
  </g>

  <!-- ===== RIGHT BOTTOM: what the numbers say ===== -->
  <rect x="800" y="470" width="750" height="355" rx="10" fill="#eef2f7" stroke="#cdd8e6" filter="url(#sh)"/>
  <text x="824" y="510" font-size="18" font-weight="bold" fill="#1f3a5f">What the numbers say</text>
  <line x1="824" y1="523" x2="1526" y2="523" stroke="#cdd8e6"/>
  <g font-size="16" fill="#333">
    <circle cx="834" cy="556" r="4" fill="#1f3a5f"/><text x="852" y="562">Revenue -12%, value of production -22%: the gap is</text>
    <text x="852" y="584">entirely the WIP timing effect (long-cycle projects).</text>
    <circle cx="834" cy="624" r="4" fill="#1f3a5f"/><text x="852" y="630">Margin compressed by lower fixed-cost absorption</text>
    <text x="852" y="652">(personnel stable in value, higher in incidence).</text>
    <circle cx="834" cy="692" r="4" fill="#1f3a5f"/><text x="852" y="698">Net loss of <tspan font-weight="bold">&#8364; 0.24M</tspan> in 2024 (vs +&#8364;0.29M in 2023).</text>
    <circle cx="834" cy="742" r="4" fill="#1f3a5f"/><text x="852" y="748"><tspan font-weight="bold">Normalised EBITDA</tspan> (cycle + intercompany adjusted) is</text>
    <text x="852" y="770">the right basis for valuation, not the 2024 point figure.</text>
  </g>

  <!-- footer -->
  <line x1="50" y1="858" x2="1550" y2="858" stroke="#e2e6ec"/>
  <text x="50" y="882" font-size="12" fill="#999999">Source: Coface Full Report (filed FY2023&#8211;2024). Amounts in &#8364; million.</text>
  <text x="1550" y="882" text-anchor="end" font-size="12" font-weight="bold" fill="#1f3a5f">2 / 3</text>
</svg>
