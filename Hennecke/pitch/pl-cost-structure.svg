<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="8" fill="#c8102e"/>
  <text x="50" y="58" font-size="32" font-weight="bold" fill="#1f3a5f">P&#38;L recap — cost structure</text>
  <text x="50" y="90" font-size="16" fill="#666666">Revenue split into EBITDA and cost categories (cost bar)</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL · For Board discussion</text>

  <!-- connectors -->
  <line x1="555" y1="198" x2="600" y2="198" stroke="#c9d2dd"/>
  <line x1="555" y1="381" x2="600" y2="381" stroke="#c9d2dd"/>
  <line x1="555" y1="588" x2="600" y2="588" stroke="#c9d2dd"/>
  <line x1="555" y1="660" x2="600" y2="660" stroke="#c9d2dd"/>
  <line x1="555" y1="687" x2="600" y2="687" stroke="#c9d2dd"/>
  <line x1="555" y1="729" x2="600" y2="729" stroke="#c9d2dd"/>

  <!-- left labels -->
  <text x="545" y="203" text-anchor="end" font-size="16" fill="#222222">EBITDA</text>
  <text x="545" y="386" text-anchor="end" font-size="16" fill="#222222">Materials</text>
  <text x="545" y="593" text-anchor="end" font-size="16" fill="#222222">Personnel</text>
  <text x="545" y="657" text-anchor="end" font-size="12" fill="#222222">Transport &amp; utilities</text>
  <text x="545" y="691" text-anchor="end" font-size="12" fill="#222222">Maintenance</text>
  <text x="545" y="733" text-anchor="end" font-size="14" fill="#222222">Overheads</text>

  <!-- stacked cost bar (x=600,w=150) -->
  <rect x="600" y="168" width="150" height="60"  fill="#84bd00" filter="url(#sh)"/>
  <rect x="600" y="228" width="150" height="306" fill="#f2a100"/>
  <rect x="600" y="534" width="150" height="108" fill="#d9531e"/>
  <rect x="600" y="642" width="150" height="36"  fill="#8c5a2b"/>
  <rect x="600" y="678" width="150" height="18"  fill="#bfbfbf"/>
  <rect x="600" y="696" width="150" height="66"  fill="#243746"/>

  <!-- % inside -->
  <text x="675" y="204" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">10%</text>
  <text x="675" y="387" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">51%</text>
  <text x="675" y="594" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">18%</text>
  <text x="675" y="665" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">6%</text>
  <text x="675" y="692" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a1a">3%</text>
  <text x="675" y="734" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">11%</text>

  <text x="675" y="784" text-anchor="middle" font-size="13" font-weight="bold" fill="#666666">Cost bar</text>

  <!-- right recap panel -->
  <rect x="950" y="160" width="600" height="600" rx="6" fill="#f7f8fa" stroke="#dfe4ea" filter="url(#sh)"/>
  <rect x="950" y="160" width="600" height="46" fill="#1f3a5f"/>
  <text x="974" y="190" font-size="16" font-weight="bold" fill="#ffffff">Cost structure — recap</text>
  <g font-size="16">
    <rect x="974" y="240" width="20" height="20" fill="#84bd00"/><text x="1006" y="256" fill="#222"><tspan font-weight="bold">EBITDA</tspan>        <tspan fill="#666">10%</tspan></text>
    <rect x="974" y="296" width="20" height="20" fill="#f2a100"/><text x="1006" y="312" fill="#222"><tspan font-weight="bold">Materials</tspan>        <tspan fill="#666">51%</tspan></text>
    <rect x="974" y="352" width="20" height="20" fill="#d9531e"/><text x="1006" y="368" fill="#222"><tspan font-weight="bold">Personnel</tspan>        <tspan fill="#666">18%</tspan></text>
    <rect x="974" y="408" width="20" height="20" fill="#8c5a2b"/><text x="1006" y="424" fill="#222"><tspan font-weight="bold">Transport &amp; utilities</tspan>        <tspan fill="#666">6%</tspan></text>
    <rect x="974" y="464" width="20" height="20" fill="#bfbfbf"/><text x="1006" y="480" fill="#222"><tspan font-weight="bold">Maintenance</tspan>        <tspan fill="#666">3%</tspan></text>
    <rect x="974" y="520" width="20" height="20" fill="#243746"/><text x="1006" y="536" fill="#222"><tspan font-weight="bold">Overheads</tspan>        <tspan fill="#666">11%</tspan></text>
  </g>
  <line x1="974" y1="572" x2="1526" y2="572" stroke="#e2e6ec"/>
  <text x="974" y="606" font-size="14" fill="#333333"><tspan font-weight="bold" fill="#2e7d4f">EBITDA margin 10%</tspan>; materials are the</text>
  <text x="974" y="628" font-size="14" fill="#333333">dominant cost at 51% — the key lever on</text>
  <text x="974" y="650" font-size="14" fill="#333333">profitability.</text>

  <line x1="50" y1="858" x2="1550" y2="858" stroke="#e2e6ec"/>
  <text x="50" y="882" font-size="11" fill="#999999">% of revenue / value of production, per the provided breakdown (sums to ~100% net of rounding).</text>
  <text x="1550" y="882" text-anchor="end" font-size="11" font-weight="bold" fill="#1f3a5f">3 / 7</text>
</svg>
