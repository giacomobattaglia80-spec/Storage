<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect width="1600" height="8" fill="#c8102e"/>
  <text x="50" y="58" font-size="32" font-weight="bold" fill="#1f3a5f">P&#38;L recap — cost structure (2023 vs 2024)</text>
  <text x="50" y="90" font-size="16" fill="#666666">Value of production split into EBITDA and cost categories · year-on-year</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL · For Board discussion</text>

  <text x="468" y="172" text-anchor="end" font-size="11" fill="#999999">% of value</text>
  <text x="468" y="190" text-anchor="end" font-size="11" fill="#999999">of production</text>

  <!-- flow connectors (2023 right edge x=610 -> 2024 left edge x=720) -->
  <g stroke="#d9dee6" stroke-width="1">
    <line x1="610" y1="165"   x2="720" y2="165"/>
    <line x1="610" y1="207"   x2="720" y2="187.8"/>
    <line x1="610" y1="483"   x2="720" y2="418.2"/>
    <line x1="610" y1="621.6" x2="720" y2="600"/>
    <line x1="610" y1="741"   x2="720" y2="736.8"/>
    <line x1="610" y1="763.8" x2="720" y2="762"/>
    <line x1="610" y1="765.6" x2="720" y2="765"/>
  </g>

  <!-- 2023 bar (x=480 w=130) -->
  <rect x="480" y="165"   width="130" height="42"    fill="#84bd00" filter="url(#sh)"/>
  <rect x="480" y="207"   width="130" height="276"   fill="#f2a100"/>
  <rect x="480" y="483"   width="130" height="138.6" fill="#d9531e"/>
  <rect x="480" y="621.6" width="130" height="119.4" fill="#3c7da6"/>
  <rect x="480" y="741"   width="130" height="22.8"  fill="#8c5a2b"/>
  <rect x="480" y="763.8" width="130" height="1.8"   fill="#bfbfbf"/>
  <text x="545" y="191" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">7.0%</text>
  <text x="545" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">46.0%</text>
  <text x="545" y="557" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">23.1%</text>
  <text x="545" y="686" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">19.9%</text>
  <text x="545" y="756" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">3.8%</text>

  <!-- 2024 bar (x=720 w=130) -->
  <rect x="720" y="165"   width="130" height="22.8"  fill="#84bd00" filter="url(#sh)"/>
  <rect x="720" y="187.8" width="130" height="230.4" fill="#f2a100"/>
  <rect x="720" y="418.2" width="130" height="181.8" fill="#d9531e"/>
  <rect x="720" y="600"   width="130" height="136.8" fill="#3c7da6"/>
  <rect x="720" y="736.8" width="130" height="25.2"  fill="#8c5a2b"/>
  <rect x="720" y="762"   width="130" height="3.0"   fill="#bfbfbf"/>
  <text x="785" y="181" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a1a">3.8%</text>
  <text x="785" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">38.4%</text>
  <text x="785" y="494" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">30.3%</text>
  <text x="785" y="673" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">22.8%</text>
  <text x="785" y="753" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">4.2%</text>

  <text x="545" y="788" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f3a5f">2023</text>
  <text x="785" y="788" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f3a5f">2024</text>

  <!-- recap table -->
  <rect x="960" y="190" width="590" height="300" rx="6" fill="#f7f8fa" stroke="#dfe4ea"/>
  <text x="982" y="218" font-size="12" font-weight="bold" fill="#666666">Category</text>
  <text x="1298" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">2023</text>
  <text x="1400" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">2024</text>
  <text x="1499" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">&#916; pp</text>
  <line x1="982" y1="230" x2="1544" y2="230" stroke="#dfe4ea"/>
  <g font-size="12">
    <!-- rows -->
    <g><rect x="984" y="250" width="13" height="13" fill="#84bd00"/><text x="1004" y="261" font-weight="bold" fill="#222">EBITDA</text><text x="1298" y="261" text-anchor="middle" fill="#333">7.0%</text><text x="1400" y="261" text-anchor="middle" fill="#333">3.8%</text><text x="1499" y="261" text-anchor="middle" font-weight="bold" fill="#c8102e">-3.2</text></g>
    <g><rect x="984" y="286" width="13" height="13" fill="#f2a100"/><text x="1004" y="297" font-weight="bold" fill="#222">Materials</text><text x="1298" y="297" text-anchor="middle" fill="#333">46.0%</text><text x="1400" y="297" text-anchor="middle" fill="#333">38.4%</text><text x="1499" y="297" text-anchor="middle" font-weight="bold" fill="#2e7d4f">-7.6</text></g>
    <g><rect x="984" y="322" width="13" height="13" fill="#d9531e"/><text x="1004" y="333" font-weight="bold" fill="#222">Personnel</text><text x="1298" y="333" text-anchor="middle" fill="#333">23.1%</text><text x="1400" y="333" text-anchor="middle" fill="#333">30.3%</text><text x="1499" y="333" text-anchor="middle" font-weight="bold" fill="#c8102e">+7.2</text></g>
    <g><rect x="984" y="358" width="13" height="13" fill="#3c7da6"/><text x="1004" y="369" font-weight="bold" fill="#222">Services</text><text x="1298" y="369" text-anchor="middle" fill="#333">19.9%</text><text x="1400" y="369" text-anchor="middle" fill="#333">22.8%</text><text x="1499" y="369" text-anchor="middle" font-weight="bold" fill="#c8102e">+2.9</text></g>
    <g><rect x="984" y="394" width="13" height="13" fill="#8c5a2b"/><text x="1004" y="405" font-weight="bold" fill="#222">Lease &amp; rentals</text><text x="1298" y="405" text-anchor="middle" fill="#333">3.8%</text><text x="1400" y="405" text-anchor="middle" fill="#333">4.2%</text><text x="1499" y="405" text-anchor="middle" font-weight="bold" fill="#c8102e">+0.4</text></g>
    <g><rect x="984" y="430" width="13" height="13" fill="#bfbfbf"/><text x="1004" y="441" font-weight="bold" fill="#222">Other op. costs</text><text x="1298" y="441" text-anchor="middle" fill="#333">0.3%</text><text x="1400" y="441" text-anchor="middle" fill="#333">0.5%</text><text x="1499" y="441" text-anchor="middle" font-weight="bold" fill="#c8102e">+0.2</text></g>
  </g>

  <!-- callout -->
  <rect x="960" y="505" width="590" height="150" rx="6" fill="#eef2f7" stroke="#cdd8e6"/>
  <text x="982" y="535" font-size="14" fill="#333"><tspan font-weight="bold" fill="#1f3a5f">Fixed-cost absorption is the story:</tspan> personnel rises</text>
  <text x="982" y="557" font-size="14" fill="#333"><tspan font-weight="bold">+7pp</tspan> of output (stable in €, heavier on lower volume) while</text>
  <text x="982" y="579" font-size="14" fill="#333">materials fall <tspan font-weight="bold">-8pp</tspan> (variable) — net, EBITDA compresses</text>
  <text x="982" y="601" font-size="14" fill="#333">from 7.0% to 3.8%.</text>
  <text x="982" y="632" font-size="12" font-style="italic" fill="#666">Read with the project cycle: 2024 value of production is lower as the 2023 WIP build-up unwinds.</text>

  <line x1="50" y1="852" x2="1550" y2="852" stroke="#e2e6ec"/>
  <text x="50" y="876" font-size="10.5" fill="#999999">% of value of production (€52.0m 2023 / €40.7m 2024). 2023 base inflated by WIP build-up (+€19.3m); on a revenue basis EBITDA margin was 7.2% (2023) / 3.5% (2024). Source: Coface reclassified P&#38;L.</text>
  <text x="1550" y="876" text-anchor="end" font-size="11" font-weight="bold" fill="#1f3a5f">3 / 7</text>
</svg>
