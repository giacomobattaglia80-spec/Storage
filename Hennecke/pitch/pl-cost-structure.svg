<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.16"/></filter></defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect width="1600" height="8" fill="#c8102e"/>
  <text x="50" y="58" font-size="31" font-weight="bold" fill="#1f3a5f">P&#38;L recap — cost structure (2023 · 2024 · normalised)</text>
  <text x="50" y="90" font-size="16" fill="#666666">Summing both years nets out the project-cycle WIP swing → a normalised run-rate</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL · For Board discussion</text>
  <text x="418" y="172" text-anchor="end" font-size="11" fill="#999999">% of value</text>
  <text x="418" y="190" text-anchor="end" font-size="11" fill="#999999">of production</text>

  <!-- connectors bar1->bar2 -->
  <g stroke="#d9dee6" stroke-width="1">
    <line x1="550" y1="165"   x2="640" y2="165"/>
    <line x1="550" y1="207"   x2="640" y2="187.8"/>
    <line x1="550" y1="483"   x2="640" y2="418.2"/>
    <line x1="550" y1="621.6" x2="640" y2="600"/>
    <line x1="550" y1="741"   x2="640" y2="736.8"/>
    <line x1="550" y1="765.6" x2="640" y2="765"/>
  </g>
  <!-- connectors bar2->bar3 -->
  <g stroke="#d9dee6" stroke-width="1">
    <line x1="760" y1="165"   x2="850" y2="165"/>
    <line x1="760" y1="187.8" x2="850" y2="198.6"/>
    <line x1="760" y1="418.2" x2="850" y2="454.8"/>
    <line x1="760" y1="600"   x2="850" y2="612"/>
    <line x1="760" y1="736.8" x2="850" y2="739.2"/>
    <line x1="760" y1="765"   x2="850" y2="765.6"/>
  </g>
  <rect x="802" y="162" width="1.6" height="620" fill="#c9d2dd"/>

  <!-- 2023 bar x=430 -->
  <rect x="430" y="165"   width="120" height="42"    fill="#84bd00" filter="url(#sh)"/>
  <rect x="430" y="207"   width="120" height="276"   fill="#f2a100"/>
  <rect x="430" y="483"   width="120" height="138.6" fill="#d9531e"/>
  <rect x="430" y="621.6" width="120" height="119.4" fill="#3c7da6"/>
  <rect x="430" y="741"   width="120" height="22.8"  fill="#8c5a2b"/>
  <rect x="430" y="763.8" width="120" height="1.8"   fill="#bfbfbf"/>
  <text x="490" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">7.0%</text>
  <text x="490" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">46.0%</text>
  <text x="490" y="557" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">23.1%</text>
  <text x="490" y="686" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">19.9%</text>
  <text x="490" y="756" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">3.8%</text>

  <!-- 2024 bar x=640 -->
  <rect x="640" y="165"   width="120" height="22.8"  fill="#84bd00" filter="url(#sh)"/>
  <rect x="640" y="187.8" width="120" height="230.4" fill="#f2a100"/>
  <rect x="640" y="418.2" width="120" height="181.8" fill="#d9531e"/>
  <rect x="640" y="600"   width="120" height="136.8" fill="#3c7da6"/>
  <rect x="640" y="736.8" width="120" height="25.2"  fill="#8c5a2b"/>
  <rect x="640" y="762"   width="120" height="3.0"   fill="#bfbfbf"/>
  <text x="700" y="181" text-anchor="middle" font-size="9"  font-weight="bold" fill="#1a1a1a">3.8%</text>
  <text x="700" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">38.4%</text>
  <text x="700" y="513" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">30.3%</text>
  <text x="700" y="673" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">22.8%</text>
  <text x="700" y="752" text-anchor="middle" font-size="9"  font-weight="bold" fill="#ffffff">4.2%</text>

  <!-- 2-yr bar x=850 -->
  <rect x="850" y="165"   width="120" height="33.6"  fill="#84bd00" filter="url(#sh)"/>
  <rect x="850" y="198.6" width="120" height="256.2" fill="#f2a100"/>
  <rect x="850" y="454.8" width="120" height="157.2" fill="#d9531e"/>
  <rect x="850" y="612"   width="120" height="127.2" fill="#3c7da6"/>
  <rect x="850" y="739.2" width="120" height="24.0"  fill="#8c5a2b"/>
  <rect x="850" y="763.2" width="120" height="2.4"   fill="#bfbfbf"/>
  <text x="910" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a1a">5.6%</text>
  <text x="910" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">42.7%</text>
  <text x="910" y="538" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">26.2%</text>
  <text x="910" y="681" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">21.2%</text>
  <text x="910" y="755" text-anchor="middle" font-size="9"  font-weight="bold" fill="#ffffff">4.0%</text>

  <text x="490" y="788" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f3a5f">2023</text>
  <text x="700" y="788" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f3a5f">2024</text>
  <text x="910" y="788" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f3a5f">2-yr</text>
  <text x="910" y="808" text-anchor="middle" font-size="11" fill="#666666">(normalised)</text>

  <!-- recap table -->
  <rect x="1010" y="190" width="540" height="300" rx="6" fill="#f7f8fa" stroke="#dfe4ea"/>
  <text x="1030" y="218" font-size="12" font-weight="bold" fill="#666666">Category</text>
  <text x="1300" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">2023</text>
  <text x="1400" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#666666">2024</text>
  <text x="1500" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f3a5f">2-yr</text>
  <line x1="1030" y1="230" x2="1540" y2="230" stroke="#dfe4ea"/>
  <g font-size="12">
    <g><rect x="1032" y="250" width="13" height="13" fill="#84bd00"/><text x="1052" y="261" font-weight="bold" fill="#222">EBITDA</text><text x="1300" y="261" text-anchor="middle" fill="#333">7.0%</text><text x="1400" y="261" text-anchor="middle" fill="#333">3.8%</text><text x="1500" y="261" text-anchor="middle" font-weight="bold" fill="#1f3a5f">5.6%</text></g>
    <g><rect x="1032" y="286" width="13" height="13" fill="#f2a100"/><text x="1052" y="297" font-weight="bold" fill="#222">Materials</text><text x="1300" y="297" text-anchor="middle" fill="#333">46.0%</text><text x="1400" y="297" text-anchor="middle" fill="#333">38.4%</text><text x="1500" y="297" text-anchor="middle" font-weight="bold" fill="#1f3a5f">42.7%</text></g>
    <g><rect x="1032" y="322" width="13" height="13" fill="#d9531e"/><text x="1052" y="333" font-weight="bold" fill="#222">Personnel</text><text x="1300" y="333" text-anchor="middle" fill="#333">23.1%</text><text x="1400" y="333" text-anchor="middle" fill="#333">30.3%</text><text x="1500" y="333" text-anchor="middle" font-weight="bold" fill="#1f3a5f">26.2%</text></g>
    <g><rect x="1032" y="358" width="13" height="13" fill="#3c7da6"/><text x="1052" y="369" font-weight="bold" fill="#222">Services</text><text x="1300" y="369" text-anchor="middle" fill="#333">19.9%</text><text x="1400" y="369" text-anchor="middle" fill="#333">22.8%</text><text x="1500" y="369" text-anchor="middle" font-weight="bold" fill="#1f3a5f">21.2%</text></g>
    <g><rect x="1032" y="394" width="13" height="13" fill="#8c5a2b"/><text x="1052" y="405" font-weight="bold" fill="#222">Lease &amp; rentals</text><text x="1300" y="405" text-anchor="middle" fill="#333">3.8%</text><text x="1400" y="405" text-anchor="middle" fill="#333">4.2%</text><text x="1500" y="405" text-anchor="middle" font-weight="bold" fill="#1f3a5f">4.0%</text></g>
    <g><rect x="1032" y="430" width="13" height="13" fill="#bfbfbf"/><text x="1052" y="441" font-weight="bold" fill="#222">Other op. costs</text><text x="1300" y="441" text-anchor="middle" fill="#333">0.3%</text><text x="1400" y="441" text-anchor="middle" fill="#333">0.5%</text><text x="1500" y="441" text-anchor="middle" font-weight="bold" fill="#1f3a5f">0.4%</text></g>
  </g>

  <!-- callout -->
  <rect x="1010" y="505" width="540" height="150" rx="6" fill="#eef2f7" stroke="#cdd8e6"/>
  <text x="1032" y="535" font-size="14" fill="#333"><tspan font-weight="bold" fill="#1f3a5f">Normalising the cycle:</tspan> aggregating 2023+2024 nets</text>
  <text x="1032" y="557" font-size="14" fill="#333">out the WIP swing, giving a run-rate EBITDA of</text>
  <text x="1032" y="579" font-size="14" fill="#333"><tspan font-weight="bold">~5.6% of value of production</tspan> (~5.5% of revenue) — a</text>
  <text x="1032" y="601" font-size="14" fill="#333">fairer valuation base than either single year.</text>
  <text x="1032" y="632" font-size="12" font-style="italic" fill="#666">Single years distorted by project timing: 7.0% (2023, build-up) vs 3.8% (2024, unwind).</text>

  <line x1="50" y1="852" x2="1550" y2="852" stroke="#e2e6ec"/>
  <text x="50" y="876" font-size="10.5" fill="#999999">2-yr = 2023+2024 aggregated (value of production €92.7m), neutralising the project-cycle WIP swing. % of value of production; may not sum to 100 (rounding). Source: Coface reclassified P&#38;L.</text>
  <text x="1550" y="876" text-anchor="end" font-size="11" font-weight="bold" fill="#1f3a5f">3 / 7</text>
</svg>
