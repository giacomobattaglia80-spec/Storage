  <text x="120" y="758" font-size="20" fill="#9fb2c8">June 2026</text>

  <text x="1480" y="722" text-anchor="end" font-size="18" fill="#9fb2c8">Based on FY2023&#8211;2024 filed financials</text>
  <text x="1480" y="752" text-anchor="end" font-size="18" fill="#9fb2c8">Sources: Coface &#183; Chamber of Commerce &#183; public</text>

