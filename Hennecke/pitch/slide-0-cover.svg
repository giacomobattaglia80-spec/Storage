  <line x1="120" y1="820" x2="1480" y2="820" stroke="#2d4769"/>
  <text x="120" y="858" font-size="14" fill="#7e93ac">CONFIDENTIAL &#8212; For Board discussion only. Not an investment recommendation; subject to specialist Due Diligence.</text>
