<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="8" fill="#c8102e"/>

  <!-- header -->
  <text x="50" y="62" font-size="33" font-weight="bold" fill="#1f3a5f">HENNECKE-OMS S.p.A. &#8212; Investment opportunity</text>
  <text x="50" y="92" font-size="17" fill="#666666">Italian PU-machinery hub of the Hennecke Group &#183; potential carve-out / platform deal</text>
  <text x="1550" y="40" text-anchor="end" font-size="12" fill="#999999">CONFIDENTIAL &#183; For Board discussion</text>

  <!-- ===== LEFT: company at a glance ===== -->
  <rect x="50" y="125" width="720" height="700" rx="10" fill="#f7f8fa" stroke="#dfe4ea" filter="url(#sh)"/>
  <rect x="50" y="125" width="720" height="48" rx="10" fill="#1f3a5f"/>
  <rect x="50" y="150" width="720" height="23" fill="#1f3a5f"/>
  <text x="74" y="157" font-size="18" font-weight="bold" fill="#ffffff">Company at a glance</text>

  <g font-size="17" fill="#222222">
    <circle cx="82" cy="213" r="4" fill="#c8102e"/><text x="100" y="219">Italian production hub of the <tspan font-weight="bold">Hennecke Group</tspan> &#8212; a world</text>
    <text x="100" y="243">leader in polyurethane (PU) processing machinery.</text>

    <circle cx="82" cy="281" r="4" fill="#c8102e"/><text x="100" y="287">HQ &amp; plant in <tspan font-weight="bold">Verano Brianza (MB), Italy</tspan>; roots in the</text>
    <text x="100" y="311">historic OMS engineering district (since 1986).</text>

    <circle cx="82" cy="349" r="4" fill="#c8102e"/><text x="100" y="355"><tspan font-weight="bold">100% owned by Hennecke GmbH (DE)</tspan> &#8212; captive</text>
    <text x="100" y="379">subsidiary, subject to direction &amp; coordination.</text>

    <circle cx="82" cy="417" r="4" fill="#c8102e"/><text x="100" y="423">Turnkey lines for flexible &amp; rigid PU foam: slabstock,</text>
    <text x="100" y="447">sandwich panels, refrigeration, automotive, footwear.</text>

    <circle cx="82" cy="485" r="4" fill="#c8102e"/><text x="100" y="491">~166 employees (2024); <tspan font-weight="bold">ISO 9001 &amp; 14001</tspan> certified.</text>

    <circle cx="82" cy="535" r="4" fill="#c8102e"/><text x="100" y="541">Global installed base &#8212; recurring aftermarket potential.</text>
  </g>

  <!-- group note -->
  <rect x="74" y="585" width="672" height="200" rx="8" fill="#eef2f7" stroke="#cdd8e6"/>
  <text x="96" y="620" font-size="16" font-weight="bold" fill="#1f3a5f">Group context</text>
  <text x="96" y="650" font-size="15" fill="#333333">The parent Hennecke Group was acquired by <tspan font-weight="bold">Br&#252;ckner</tspan></text>
  <text x="96" y="674" font-size="15" fill="#333333"><tspan font-weight="bold">Group SE</tspan> (closing 5 Jan 2026), from a fund advised by Capvis.</text>
  <text x="96" y="704" font-size="15" fill="#333333">Hennecke = ~680 employees, ~15 companies, two brands</text>
  <text x="96" y="728" font-size="15" fill="#333333">(Hennecke Polyurethane Technology &amp; Hennecke-OMS).</text>
  <text x="96" y="762" font-size="13" fill="#888888">Upstream ownership inferred from public sources.</text>

  <!-- ===== RIGHT: KPI tiles ===== -->
  <text x="800" y="155" font-size="20" font-weight="bold" fill="#1f3a5f">Key figures 2024</text>

  <!-- tile 1 -->
  <rect x="800" y="175" width="360" height="120" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="820" y="212" font-size="15" fill="#777777">Revenue 2024</text>
  <text x="820" y="258" font-size="38" font-weight="bold" fill="#1f3a5f">&#8364; 44.2M</text>
  <text x="820" y="283" font-size="14" fill="#c8102e">-12% YoY</text>
  <!-- tile 2 -->
  <rect x="1190" y="175" width="360" height="120" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="1210" y="212" font-size="15" fill="#777777">EBITDA 2024</text>
  <text x="1210" y="258" font-size="38" font-weight="bold" fill="#1f3a5f">&#8364; 1.5M</text>
  <text x="1210" y="283" font-size="14" fill="#c8102e">3.5% margin (vs 7.2% in 2023)</text>
  <!-- tile 3 -->
  <rect x="800" y="315" width="360" height="120" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="820" y="352" font-size="15" fill="#777777">Liquidity vs bank debt</text>
  <text x="820" y="398" font-size="34" font-weight="bold" fill="#1f3a5f">&#8364; 10.4M</text>
  <text x="820" y="423" font-size="14" fill="#4a7a4a">cash &#183; vs &#8364; 6.9M M/L bank debt</text>
  <!-- tile 4 -->
  <rect x="1190" y="315" width="360" height="120" rx="10" fill="#ffffff" stroke="#dfe4ea" filter="url(#sh)"/>
  <text x="1210" y="352" font-size="15" fill="#777777">Shareholders' equity</text>
  <text x="1210" y="398" font-size="34" font-weight="bold" fill="#1f3a5f">&#8364; 6.0M</text>
  <text x="1210" y="423" font-size="14" fill="#777777">thin &#8212; 15.5% of total assets</text>

  <!-- deal angle -->
  <rect x="800" y="470" width="750" height="355" rx="10" fill="#1f3a5f" filter="url(#sh)"/>
  <text x="824" y="512" font-size="20" font-weight="bold" fill="#ffffff">Deal angle</text>
  <line x1="824" y1="528" x2="1526" y2="528" stroke="#3a5578"/>
  <g font-size="17" fill="#e9eef5">
    <circle cx="834" cy="566" r="4" fill="#f2c200"/><text x="852" y="572"><tspan font-weight="bold" fill="#ffffff">Carve-out</tspan> of the Italian entity, or acquisition of the</text>
    <text x="852" y="596">entire Hennecke Group as a platform.</text>
    <circle cx="834" cy="638" r="4" fill="#f2c200"/><text x="852" y="644">Light balance sheet: low debt, high liquidity, working</text>
    <text x="852" y="668">capital self-financed by customer advances (&#8364;10.9M).</text>
    <circle cx="834" cy="710" r="4" fill="#f2c200"/><text x="852" y="716">Shares currently <tspan font-weight="bold" fill="#ffffff">pledged</tspan> &#8212; to be released on sale.</text>
    <circle cx="834" cy="760" r="4" fill="#f2c200"/><text x="852" y="766">Coface credit score 5/10 (medium-high risk).</text>
  </g>

  <!-- footer -->
  <line x1="50" y1="858" x2="1550" y2="858" stroke="#e2e6ec"/>
  <text x="50" y="882" font-size="12" fill="#999999">HENNECKE-OMS S.p.A. &#8212; Project recap for the Board</text>
  <text x="1550" y="882" text-anchor="end" font-size="12" font-weight="bold" fill="#1f3a5f">1 / 3</text>
</svg>
