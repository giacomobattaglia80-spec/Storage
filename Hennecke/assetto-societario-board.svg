<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1040" viewBox="0 0 1680 1040" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1680" height="1040" fill="#ffffff"/>
  <rect x="0" y="0" width="1680" height="10" fill="#c8102e"/>

  <!-- Title -->
  <text x="60" y="58" font-size="34" font-weight="bold" fill="#1f3a5f">Hennecke GROUP &#8212; Nuovo assetto societario</text>
  <text x="60" y="92" font-size="19" fill="#444444">Acquisizione da parte di Br&#252;ckner Group SE &#183; accordo 3 dic. 2025 &#183; closing 5 gen. 2026 &#183; venditore: fondo Capvis AG</text>

  <!-- ===================== Holding ===================== -->
  <rect x="680" y="120" width="320" height="78" rx="8" fill="#1f3a5f" filter="url(#sh)"/>
  <text x="840" y="152" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">Br&#252;ckner Group SE</text>
  <text x="840" y="178" text-anchor="middle" font-size="15" fill="#cdd8e6">Siegsdorf (DE) &#183; Capogruppo / Holding</text>

  <!-- Connectors holding -> divisions -->
  <line x1="840" y1="198" x2="840" y2="228" stroke="#9aa7b8" stroke-width="2"/>
  <line x1="200" y1="228" x2="1480" y2="228" stroke="#9aa7b8" stroke-width="2"/>
  <line x1="200" y1="228" x2="200" y2="262" stroke="#9aa7b8" stroke-width="2"/>
  <line x1="520" y1="228" x2="520" y2="262" stroke="#9aa7b8" stroke-width="2"/>
  <line x1="840" y1="228" x2="840" y2="262" stroke="#9aa7b8" stroke-width="2"/>
  <line x1="1160" y1="228" x2="1160" y2="262" stroke="#9aa7b8" stroke-width="2"/>
  <line x1="1480" y1="228" x2="1480" y2="262" stroke="#9aa7b8" stroke-width="2"/>

  <!-- ===================== Divisions (5) ===================== -->
  <!-- 1 Maschinenbau -->
  <rect x="60" y="262" width="280" height="72" rx="8" fill="#e6edf5" stroke="#6b86a8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="200" y="298" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f3a5f">Br&#252;ckner</text>
  <text x="200" y="320" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f3a5f">Maschinenbau</text>
  <!-- 2 Servtec -->
  <rect x="380" y="262" width="280" height="72" rx="8" fill="#e6edf5" stroke="#6b86a8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="520" y="298" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f3a5f">Br&#252;ckner</text>
  <text x="520" y="320" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f3a5f">Servtec</text>
  <!-- 3 Hennecke (highlight) -->
  <rect x="700" y="258" width="280" height="80" rx="8" fill="#c8102e" stroke="#7a0a1c" stroke-width="2" filter="url(#sh)"/>
  <text x="840" y="292" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Hennecke GROUP</text>
  <text x="840" y="316" text-anchor="middle" font-size="13" fill="#ffd7dc">nuova divisione &#183; ~680 dip. &#183; ~15 societ&#224;</text>
  <!-- 4 Kiefel -->
  <rect x="1020" y="262" width="280" height="72" rx="8" fill="#e6edf5" stroke="#6b86a8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1160" y="305" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f3a5f">Kiefel</text>
  <!-- 5 PackSys -->
  <rect x="1340" y="262" width="280" height="72" rx="8" fill="#e6edf5" stroke="#6b86a8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1480" y="305" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f3a5f">PackSys Global</text>

  <!-- Connectors Hennecke -> brands -->
  <line x1="840" y1="338" x2="840" y2="372" stroke="#c8102e" stroke-width="2"/>
  <line x1="620" y1="372" x2="1060" y2="372" stroke="#c8102e" stroke-width="2"/>
  <line x1="620" y1="372" x2="620" y2="406" stroke="#c8102e" stroke-width="2"/>
  <line x1="1060" y1="372" x2="1060" y2="406" stroke="#c8102e" stroke-width="2"/>

  <!-- ===================== Brands (2) ===================== -->
  <rect x="460" y="406" width="320" height="62" rx="8" fill="#f2c200" stroke="#b38f00" stroke-width="1.5" filter="url(#sh)"/>
  <text x="620" y="432" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Hennecke</text>
  <text x="620" y="453" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Polyurethane Technology</text>

  <rect x="900" y="406" width="320" height="62" rx="8" fill="#f2c200" stroke="#b38f00" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1060" y="444" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Hennecke-OMS</text>

  <!-- Connectors brands -> panels -->
  <line x1="620" y1="468" x2="620" y2="500" stroke="#b38f00" stroke-width="1.5"/>
  <line x1="1060" y1="468" x2="1060" y2="500" stroke="#b38f00" stroke-width="1.5"/>

  <!-- ===================== Panel 1: PU Technology companies ===================== -->
  <rect x="430" y="500" width="380" height="262" rx="8" fill="#f7f8fa" stroke="#9aa7b8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="620" y="528" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f3a5f">Societ&#224; controllate</text>
  <line x1="455" y1="540" x2="785" y2="540" stroke="#d5dbe3" stroke-width="1"/>
  <text x="455" y="568" font-size="14" fill="#222222">&#8226; Hennecke GmbH &#8212; Sankt Augustin (DE) &#183; HQ</text>
  <text x="455" y="596" font-size="14" fill="#222222">&#8226; Hennecke Inc. &#8212; Pittsburgh (USA)</text>
  <text x="455" y="624" font-size="14" fill="#222222">&#8226; Hennecke Machinery (Shanghai) Ltd. (CN)</text>
  <text x="455" y="652" font-size="14" fill="#222222">&#8226; Hennecke Machinery (Jiaxing) Ltd. (CN)</text>
  <text x="455" y="680" font-size="14" fill="#222222">&#8226; Hennecke Asia Pte. Ltd. &#8212; Singapore</text>
  <text x="473" y="702" font-size="12" fill="#666666">uffici: Thailandia &#183; India &#183; Vietnam</text>
  <text x="455" y="728" font-size="14" fill="#222222">&#8226; Hennecke Machinery Japan K.K. &#8212; Tokyo</text>
  <text x="455" y="756" font-size="14" fill="#222222">&#8226; Hennecke Korea Ltd. &#8212; Seoul</text>

  <!-- ===================== Panel 2: OMS companies ===================== -->
  <rect x="900" y="500" width="320" height="110" rx="8" fill="#f7f8fa" stroke="#9aa7b8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1060" y="528" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f3a5f">Societ&#224; controllate</text>
  <line x1="925" y1="540" x2="1195" y2="540" stroke="#d5dbe3" stroke-width="1"/>
  <text x="925" y="568" font-size="14" fill="#222222">&#8226; Hennecke-OMS S.p.A.</text>
  <text x="943" y="590" font-size="13" fill="#666666">Verano Brianza (IT)</text>

  <!-- ===================== Ownership timeline ===================== -->
  <text x="60" y="838" font-size="18" font-weight="bold" fill="#1f3a5f">Cronologia delle cessioni</text>
  <line x1="60" y1="852" x2="1620" y2="852" stroke="#e2e6ec" stroke-width="1"/>

  <!-- nodes -->
  <g font-size="15">
    <!-- Bayer -->
    <rect x="80" y="890" width="300" height="64" rx="8" fill="#f1f1f1" stroke="#bbbbbb"/>
    <text x="230" y="918" text-anchor="middle" font-weight="bold" fill="#333333">Bayer MaterialScience</text>
    <text x="230" y="940" text-anchor="middle" font-size="13" fill="#777777">origine</text>
    <!-- arrow -->
    <line x1="380" y1="922" x2="468" y2="922" stroke="#9aa7b8" stroke-width="2"/>
    <polygon points="468,916 482,922 468,928" fill="#9aa7b8"/>
    <text x="430" y="908" text-anchor="middle" font-size="12" fill="#777777">2008</text>

    <!-- ADCURAM -->
    <rect x="490" y="890" width="300" height="64" rx="8" fill="#f1f1f1" stroke="#bbbbbb"/>
    <text x="640" y="918" text-anchor="middle" font-weight="bold" fill="#333333">ADCURAM Group AG</text>
    <text x="640" y="940" text-anchor="middle" font-size="13" fill="#777777">Monaco (DE)</text>
    <line x1="790" y1="922" x2="878" y2="922" stroke="#9aa7b8" stroke-width="2"/>
    <polygon points="878,916 892,922 878,928" fill="#9aa7b8"/>
    <text x="840" y="908" text-anchor="middle" font-size="12" fill="#777777">apr. 2016</text>

    <!-- Capvis -->
    <rect x="900" y="890" width="300" height="64" rx="8" fill="#f1f1f1" stroke="#bbbbbb"/>
    <text x="1050" y="918" text-anchor="middle" font-weight="bold" fill="#333333">Capvis (Equity IV)</text>
    <text x="1050" y="940" text-anchor="middle" font-size="13" fill="#777777">Svizzera</text>
    <line x1="1200" y1="922" x2="1288" y2="922" stroke="#c8102e" stroke-width="2.5"/>
    <polygon points="1288,915 1304,922 1288,929" fill="#c8102e"/>
    <text x="1252" y="908" text-anchor="middle" font-size="12" font-weight="bold" fill="#c8102e">5 gen. 2026</text>

    <!-- Bruckner (current) -->
    <rect x="1312" y="888" width="308" height="68" rx="8" fill="#1f3a5f" filter="url(#sh)"/>
    <text x="1466" y="916" text-anchor="middle" font-weight="bold" fill="#ffffff">Br&#252;ckner Group SE</text>
    <text x="1466" y="940" text-anchor="middle" font-size="13" fill="#cdd8e6">proprietario attuale</text>
  </g>

  <!-- Footer source note -->
  <text x="60" y="1012" font-size="12" fill="#999999">Fonti: PU Magazine, CMS Law, Hengeler Mueller, Hennecke GROUP, Br&#252;ckner Group. Date da fonti di stampa &#8212; da confermare con documentazione ufficiale.</text>
</svg>
